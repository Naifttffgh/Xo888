<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XO Online - ID System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <p>جاري الاتصال بالسيرفر...</p>
    </div>

    <div id="game-lobby" style="display:none;">
        <div class="header">
            <h2>اللاعبون المتصلون 🟢</h2>
            <div class="my-info">
                <span>اسمك: <b id="my-name-display"></b></span>
                <br>
                <small>معرفك: <span id="my-id-display"></span></small>
            </div>
        </div>
        <ul id="players-list">
            </ul>
    </div>

    <div id="game-screen" style="display:none;">
        <h2 id="game-status">انتظر قبول التحدي...</h2>
        <div class="board" id="board">
            <div class="cell" onclick="makeMove(0)"></div>
            <div class="cell" onclick="makeMove(1)"></div>
            <div class="cell" onclick="makeMove(2)"></div>
            <div class="cell" onclick="makeMove(3)"></div>
            <div class="cell" onclick="makeMove(4)"></div>
            <div class="cell" onclick="makeMove(5)"></div>
            <div class="cell" onclick="makeMove(6)"></div>
            <div class="cell" onclick="makeMove(7)"></div>
            <div class="cell" onclick="makeMove(8)"></div>
        </div>
        <button onclick="location.reload()" class="exit-btn">انسحاب للرئيسية</button>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
