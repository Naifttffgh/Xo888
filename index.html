<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XO Pro - Anti-Cheat Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen">
        <h1>لعبة XO الأسطورية 🎮</h1>
        <input type="text" id="username-input" placeholder="اكتب اسمك هنا...">
        <button onclick="login()">دخول اللعبة</button>
    </div>

    <div id="game-lobby" style="display:none;">
        <div class="header">
            <h3>مرحباً <span id="my-name-display"></span></h3>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
        
        <div class="leaderboard">
            <h4>قائمة المتصدرين 🏆</h4>
            <ul id="players-list"></ul>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <h2 id="game-status">انتظر دورك...</h2>
        <div class="board" id="board">
            <div class="cell" onclick="makeMove(0)"></div>
            <div class="cell" onclick="makeMove(1)"></div>
            <div class="cell" onclick="makeMove(2)"></div>
            <div class="cell" onclick="makeMove(3)"></div>
            <div class="cell" onclick="makeMove(4)"></div>
            <div class="cell" onclick="makeMove(5)"></div>
            <div class="cell" onclick="makeMove(6)"></div>
            <div class="cell" onclick="makeMove(7)"></div>
            <div class="cell" onclick="makeMove(8)"></div>
        </div>
        <button onclick="backToLobby()" class="back-btn">انسحاب/عودة</button>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
