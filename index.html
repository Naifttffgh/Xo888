<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XO Pro - ID Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen">
        <h2 class="loader-text">جاري التحقق من الهوية... 🛡️</h2>
    </div>

    <div id="game-lobby" style="display:none;">
        <div class="header-info">
            <h3>مرحباً: <span id="my-name-display">...</span></h3>
            <small>ID: <span id="my-id-display"></span></small>
        </div>
        
        <div class="leaderboard">
            <h4>اللاعبون المتصلون 🏆</h4>
            <ul id="players-list"></ul>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <h2 id="game-status">دور الخصم...</h2>
        <div class="board" id="board">
            <div class="cell" onclick="makeMove(0)"></div>
            <div class="cell" onclick="makeMove(1)"></div>
            <div class="cell" onclick="makeMove(2)"></div>
            <div class="cell" onclick="makeMove(3)"></div>
            <div class="cell" onclick="makeMove(4)"></div>
            <div class="cell" onclick="makeMove(5)"></div>
            <div class="cell" onclick="makeMove(6)"></div>
            <div class="cell" onclick="makeMove(7)"></div>
            <div class="cell" onclick="makeMove(8)"></div>
        </div>
        <button onclick="leaveGame()" class="exit-btn">انسحاب</button>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
